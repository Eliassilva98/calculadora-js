<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <title>Calculadora Simples</title>
</head>
<body>
    <main class="calculator" aria-label="Calculadora">
        <!--DISPLAY (aonde aparece o que voce digita e o resultado)-->
        <section class="display">
            <input
                type="text"
                class="displayInput"
                placeholder="8888888888"
                readonly
                aria-label="visor da calculadora">
        </section>

        <!--TECLADO (botões)-->
        <section class="keys" aria-label="teclado da calculadora">

            <!--Linha 1-->
            <button type="button" data-action="clear">C</button>
            <button type="button" data-action="backspace">⌫</button>
            <button type="button" data-action="percent">%</button>
            <button type="button" data-action="operator" data-operator="/">÷</button>

            <!--Linha 2-->
            <button type="button" data-action="number" data-number="7">7</button>
            <button type="button" data-action="number" data-number="8">8</button>
            <button type="button" data-action="number" data-number="9">9</button>
            <button type="button" data-action="operator" data-operator="*">x</button>

            <!--Linha 3-->
            <button type="button" data-action="number" data-number="4">4</button>
            <button type="button" data-action="number" data-number="5">5</button>
            <button type="button" data-action="number" data-number="6">6</button>
            <button type="button" data-action="operator" data-operator="-">-</button>

            <!--Linha 4-->
            <button type="button" data-action="number" data-number="1">1</button>
            <button type="button" data-action="number" data-number="2">2</button>
            <button type="button" data-action="number" data-number="3">3</button>
            <button type="button" data-action="operator" data-operator="+">+</button>

            <!--Linha 5-->
            <button type="button" data-action="number" data-number="0">0</button>
            <button type="button" data-action="decimal">.</button>
            <button type="button" data-action="equals">=</button>
            
        </section>
    </main>
    
</body>
<script src="./scripts.js" defer></script>
</html>
